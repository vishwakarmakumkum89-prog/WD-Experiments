<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Employee Management System</h2>

        <input type="text" id="name" placeholder="Employee Name">

        <input type="number" id="id" placeholder="Employee ID">

        <input type="number" id="salary" placeholder="Salary">

        <input type="text" id="department" placeholder="Department">

        <button onclick="addEmployee()">
            Add Employee
        </button>

        <button onclick="displayEmployees()">
            Display All
        </button>

        <button onclick="filterEmployees()">
            Salary > 50000
        </button>

        <button onclick="totalSalary()">
            Total Salary
        </button>

        <button onclick="averageSalary()">
            Average Salary
        </button>

        <div id="output"></div>

    </div>

    <script src="main.js"></script>

</body>
</html>
